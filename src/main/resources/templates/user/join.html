    <script>
        console.log("user/join.js")

const formData = new FormData();


const profileBoxEl = document.querySelector(".profileBox");
const profileUploadBtn = document.querySelector(".profileUploadBtn");


profileBoxEl.addEventListener('dragover',(e)=>{
console.log("dragover",e)

profileBoxEl.addEventListener('drop',(e)=>{
console.log("drop",e)

const file = e.dataTransfer.files[0];

if(file.type.startsWith("image/")){
console.log("IMAGE파일..")

while(profileBoxEl.firstChild){
    profileBoxEl.removeChild(profileBoxEl.firstChild);

imgTg.setAttribute("style","width:100%;height:100%;border-radius:50%;")
profileBoxEl.appendChild(imgTg)

//
formData.append("profileImage",file);
<!--formData.append("profileName",file.name);-->
}

e.preventDefault();

})

<!-- 생일 -->
function onlyNumber(){
const reg = /\D/g;
event.target.value = event.target.value.replace(reg, "");
}
let date = document.querySelector("#date");

// 문자열, 하이픈을 막기 위해 input event 사용
date.addEventListener("input", () => {

// 사용자 입력값은 모두 숫자만 받는다.(나머지는 ""처리)
let val = date.value.replace(/\D/g, "");
let leng = val.length;

// 출력할 결과 변수
let result = '';

// 5개일때 - 20221 : 바로 출력
if(leng < 6) result = val;
   // 6~7일 때 - 202210 : 2022-101으로 출력
else if(leng < 8){
   result += val.substring(0,4);
   result += "-";
   result += val.substring(4);
   // 8개 일 때 - 2022-1010 : 2022-10-10으로 출력
} else{
   result += val.substring(0,4);
   result += "-";
   result += val.substring(4,6);
   result += "-";
   result += val.substring(6);
}
date.value = result;
});
    </script>
